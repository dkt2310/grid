<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            width: 100%;
        }

        .mainbox {

            min-height: 100vh;
            width: 100%;
            background-color: black;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr 1fr;
            gap: 10px;
        }


        .box1 {
            background-color: red;
            grid-column: 1/2;
            grid-row: 1/3;

        }

        .box2 {
            background-color: rgb(14, 80, 92);
            grid-row: 1/2;
            grid-column: 2/4;

        }

        .box3 {
            background-color: rgb(160, 108, 12);
            grid-column: 4/6;
            grid-row: 1/2;

        }

        .box4 {
            background-color: rgb(160, 108, 12);
            grid-row: 2/4;
            grid-column: 2/3;
        }

        .box5 {
            background-color: white;
            grid-row: 2/4;
            grid-column: 3/5;

        }

        .box6 {
            background-color: red;
            grid-row: 2/5;
            grid-column: 5/6;


        }

        .box7 {
            background-color: white;
            grid-column: 1/2;
            grid-row: 3/5;
           

        }

       

        .box8 {
            background-color: rgb(14, 80, 92);
            grid-row:4/5 ;
            grid-column: 4/5;

        }

        .box9 {
            background-color: red;
             grid-row:4/5 ;
            grid-column: 2/4;


        }
    </style>
</head>

<body>
    <div class="mainbox">
        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box3"></div>
        <div class="box4"></div>
        <div class="box5"></div>
        <div class="box6"></div>
        <div class="box7"></div>
        <div class="box8"></div>
        <div class="box9"></div>

    </div>
</body>

</html>
